# Production Docker Compose — all services containerized
# Usage: docker-compose -f docker-compose.prod.yml up -d
# Requires: All images pre-built (docker-compose -f docker-compose.prod.yml build)

services:
  # ========== Infrastructure ==========
  postgres:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: ${DB_USERNAME:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-admin}
      POSTGRES_DB: postgres
    volumes:
      - postgres-prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-admin}"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    networks:
      - fitness-prod

  mongodb:
    image: mongo:7
    restart: always
    volumes:
      - mongo-prod:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    networks:
      - fitness-prod

  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.0
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - fitness-prod

  kafka:
    image: confluentinc/cp-kafka:7.7.0
    restart: always
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    networks:
      - fitness-prod

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-prod:/data
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - fitness-prod

  # ========== Application Services ==========
  eureka:
    build:
      context: ./eureka
      dockerfile: Dockerfile
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: prod
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    networks:
      - fitness-prod

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      JWT_SECRET: ${JWT_SECRET}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka/
      SPRING_DATA_REDIS_HOST: redis
    depends_on:
      - eureka
      - redis
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    networks:
      - fitness-prod

  auth-service:
    build:
      context: ./authService
      dockerfile: Dockerfile
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/postgres
      DB_USERNAME: ${DB_USERNAME:-admin}
      DB_PASSWORD: ${DB_PASSWORD:-admin}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET: ${JWT_SECRET}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka/
    depends_on:
      - postgres
      - redis
      - kafka
      - eureka
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    networks:
      - fitness-prod

  user-service:
    build:
      context: ./userservice
      dockerfile: Dockerfile
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/postgres
      DB_USERNAME: ${DB_USERNAME:-admin}
      DB_PASSWORD: ${DB_PASSWORD:-admin}
      JWT_SECRET: ${JWT_SECRET}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka/
    depends_on:
      - postgres
      - eureka
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    networks:
      - fitness-prod

  activity-service:
    build:
      context: ./activityService
      dockerfile: Dockerfile
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/fitnessActivity
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka/
    depends_on:
      - mongodb
      - kafka
      - eureka
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    networks:
      - fitness-prod

  ai-service:
    build:
      context: ./aiService
      dockerfile: Dockerfile
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/fitnessrecommendation
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka/
    depends_on:
      - mongodb
      - kafka
      - eureka
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    networks:
      - fitness-prod

  notification-service:
    build:
      context: ./notificationService
      dockerfile: Dockerfile
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/fitnessNotifications
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka/
    depends_on:
      - mongodb
      - kafka
      - eureka
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    networks:
      - fitness-prod

  analytics-service:
    build:
      context: ./analyticsService
      dockerfile: Dockerfile
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/fitnessAnalytics
      SPRING_DATA_REDIS_HOST: redis
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka/
    depends_on:
      - mongodb
      - redis
      - kafka
      - eureka
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    networks:
      - fitness-prod

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://gateway:8080
    depends_on:
      - gateway
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    networks:
      - fitness-prod

volumes:
  postgres-prod:
  mongo-prod:
  redis-prod:

networks:
  fitness-prod:
    driver: bridge
