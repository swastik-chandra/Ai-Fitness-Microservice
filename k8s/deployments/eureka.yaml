apiVersion: apps/v1
kind: Deployment
metadata:
  name: eureka
  namespace: fitness-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eureka
  template:
    metadata:
      labels:
        app: eureka
    spec:
      containers:
        - name: eureka
          image: ghcr.io/fitness-platform/eureka:latest
          ports:
            - containerPort: 8761
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "400m"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8761
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: eureka-service
  namespace: fitness-platform
spec:
  selector:
    app: eureka
  ports:
    - port: 8761
      targetPort: 8761
