name: CI/CD Pipeline

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

env:
  DOCKER_REGISTRY: docker.io
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  IMAGE_PREFIX: ${{ secrets.DOCKER_USERNAME }}/fitness

jobs:
  # ==========================================
  # Backend Unit & Integration Tests
  # ==========================================
  backend-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - { name: authService, dir: authService }
          - { name: userservice, dir: userservice }
          - { name: activityService, dir: activityService }
          - { name: aiService, dir: aiService }
          - { name: analyticsService, dir: analyticsService }
          - { name: notificationService, dir: notificationService }
          - { name: gateway, dir: gateway }
          - { name: eureka, dir: eureka }
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Run Unit Tests
        working-directory: ./${{ matrix.service.dir }}
        run: ./mvnw test -B

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.service.name }}
          path: ./${{ matrix.service.dir }}/target/surefire-reports/

  # ==========================================
  # Frontend Tests (Jest + Lint)
  # ==========================================
  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Lint
        working-directory: ./frontend
        run: npm run lint

      - name: Type Check
        working-directory: ./frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: ./frontend
        run: npm run build

  # ==========================================
  # Security Scanning
  # ==========================================
  security-scan:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # ==========================================
  # Build & Push Docker Images
  # ==========================================
  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test, security-scan]
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - { name: eureka, dir: eureka, port: 8761 }
          - { name: gateway, dir: gateway, port: 8080 }
          - { name: user-service, dir: userservice, port: 8081 }
          - { name: auth-service, dir: authService, port: 8082 }
          - { name: ai-service, dir: aiService, port: 8083 }
          - { name: activity-service, dir: activityService, port: 8084 }
          - { name: notification-service, dir: notificationService, port: 8085 }
          - { name: analytics-service, dir: analyticsService, port: 8086 }
          - { name: frontend, dir: frontend, port: 3000 }
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.IMAGE_PREFIX }}-${{ matrix.service.name }}
            ghcr.io/${{ github.repository }}/${{ matrix.service.name }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service.dir }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan Docker image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_PREFIX }}-${{ matrix.service.name }}:latest
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

  # ==========================================
  # Deploy to Kubernetes
  # ==========================================
  deploy-staging:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/develop'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name fitness-platform-eks --region ${{ secrets.AWS_REGION }}

      - name: Deploy with Helm
        uses: azure/setup-helm@v4
      - run: |
          helm upgrade --install fitness-platform ./helm/fitness-platform \
            --namespace fitness-platform --create-namespace \
            --set image.tag=${{ github.sha }} \
            --set secrets.jwtSecret=${{ secrets.JWT_SECRET }} \
            --set secrets.geminiApiKey=${{ secrets.GEMINI_API_KEY }} \
            --set secrets.dbPassword=${{ secrets.DB_PASSWORD }} \
            --wait --timeout 10m

      - name: Verify deployment
        run: |
          kubectl get pods -n fitness-platform
          kubectl rollout status deployment/gateway -n fitness-platform --timeout=5m

  deploy-production:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name fitness-platform-eks --region ${{ secrets.AWS_REGION }}

      - name: Deploy with Helm (Production)
        uses: azure/setup-helm@v4
      - run: |
          helm upgrade --install fitness-platform ./helm/fitness-platform \
            -f ./helm/fitness-platform/values-prod.yaml \
            --namespace fitness-platform --create-namespace \
            --set image.tag=${{ github.sha }} \
            --set secrets.jwtSecret=${{ secrets.JWT_SECRET }} \
            --set secrets.geminiApiKey=${{ secrets.GEMINI_API_KEY }} \
            --set secrets.dbPassword=${{ secrets.DB_PASSWORD }} \
            --wait --timeout 10m

      - name: Health check
        run: |
          kubectl get pods -n fitness-platform
          kubectl get hpa -n fitness-platform
          echo "✅ Production deployment complete"

  # ==========================================
  # E2E Tests (Post Deploy)
  # ==========================================
  e2e-tests:
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Playwright
        working-directory: ./e2e
        run: |
          npm init -y
          npm install @playwright/test
          npx playwright install --with-deps

      - name: Run E2E Tests
        working-directory: ./e2e
        run: npx playwright test
        env:
          BASE_URL: ${{ secrets.STAGING_URL }}

      - name: Upload E2E Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
