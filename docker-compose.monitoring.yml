# Full development stack including observability
# Usage: docker-compose -f docker-compose.yml -f docker-compose.monitoring.yml up -d

services:
  # ===============================
  # Prometheus — Metrics
  # ===============================
  prometheus:
    image: prom/prometheus:latest
    container_name: fitness-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
    networks:
      - fitness-network

  # ===============================
  # Grafana — Dashboards
  # ===============================
  grafana:
    image: grafana/grafana:latest
    container_name: fitness-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - fitness-network

  # ===============================
  # Zipkin — Distributed Tracing
  # ===============================
  zipkin:
    image: openzipkin/zipkin:latest
    container_name: fitness-zipkin
    restart: unless-stopped
    ports:
      - "9411:9411"
    networks:
      - fitness-network

  # ===============================
  # Elasticsearch — Log Storage
  # ===============================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: fitness-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elastic-data:/usr/share/elasticsearch/data
    networks:
      - fitness-network

  # ===============================
  # Logstash — Log Pipeline
  # ===============================
  logstash:
    image: docker.elastic.co/logstash/logstash:8.15.0
    container_name: fitness-logstash
    restart: unless-stopped
    ports:
      - "5044:5044"
    volumes:
      - ./monitoring/logstash/logstash.conf:/usr/share/logstash/pipeline/logstash.conf
    depends_on:
      - elasticsearch
    networks:
      - fitness-network

  # ===============================
  # Kibana — Log Visualization
  # ===============================
  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.0
    container_name: fitness-kibana
    restart: unless-stopped
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    depends_on:
      - elasticsearch
    networks:
      - fitness-network

volumes:
  prometheus-data:
  grafana-data:
  elastic-data:

networks:
  fitness-network:
    external: true
    name: fitness-microservice_fitness-network
