services:
  # ===============================
  # PostgreSQL — User + Auth Service DB
  # ===============================
  postgres:
    image: postgres:16
    container_name: fitness-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-admin}
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fitness-network

  # ===============================
  # Adminer — PostgreSQL GUI
  # ===============================
  adminer:
    image: adminer:latest
    container_name: fitness-adminer
    restart: unless-stopped
    ports:
      - "7676:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fitness-network

  # ===============================
  # MongoDB — Activity + AI + Analytics + Notification DB
  # ===============================
  mongodb:
    image: mongo:7
    container_name: fitness-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fitness-network

  # ===============================
  # Zookeeper — Kafka Dependency
  # ===============================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.0
    container_name: fitness-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - fitness-network

  # ===============================
  # Apache Kafka — Event Streaming
  # ===============================
  kafka:
    image: confluentinc/cp-kafka:7.7.0
    container_name: fitness-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - fitness-network

  # ===============================
  # Redis — Cache + Token Blocklist
  # ===============================
  redis:
    image: redis:7-alpine
    container_name: fitness-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fitness-network

volumes:
  postgres-data:
  mongo-data:
  redis-data:

networks:
  fitness-network:
    driver: bridge
