# Production profile
server:
  port: 8080

spring:
  application:
    name: api-gateway
  profiles:
    active: prod

  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**

        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**

        - id: activity-service
          uri: lb://activity-service
          predicates:
            - Path=/api/activities/**

        - id: ai-service
          uri: lb://ai-service
          predicates:
            - Path=/api/recommendations/**,/api/ai/**

        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/notifications/**

        - id: notification-ws
          uri: lb:ws://notification-service
          predicates:
            - Path=/ws/notifications/**

        - id: analytics-service
          uri: lb://analytics-service
          predicates:
            - Path=/api/analytics/**

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - ${ALLOWED_ORIGINS:http://localhost:3000}
            allowedMethods: [GET, POST, PUT, DELETE, OPTIONS]
            allowedHeaders: "*"
            allowCredentials: true

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      lettuce:
        pool:
          max-active: 16
          max-idle: 8

jwt:
  secret: ${JWT_SECRET}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    tags:
      application: api-gateway

logging:
  level:
    root: WARN
    com.fitness.gateway: INFO
    org.springframework.cloud.gateway: WARN
  pattern:
    console: '{"timestamp":"%d","level":"%p","service":"api-gateway","message":"%m"}%n'
