# ===============================
# Server Configuration
# ===============================
server.port=8081

# ===============================
# PostgreSQL Database Configuration
# ===============================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${DB_USERNAME:admin}
spring.datasource.password=${DB_PASSWORD:admin}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=15
spring.datasource.hikari.idle-timeout=300000

# ===============================
# JPA / Hibernate Configuration
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# Service & Eureka Configuration
# ===============================
spring.application.name=user-service
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}

# ===============================
# Disable Docker Compose Auto Run
# ===============================
spring.docker.compose.enabled=false

# ===============================
# JWT Configuration
# ===============================
jwt.secret=${JWT_SECRET:fitness-microservice-jwt-secret-key-which-is-long-enough-for-hmac-sha256}
jwt.expiration=86400000

# ===============================
# Actuator + Prometheus
# ===============================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.tags.application=user-service

# ===============================
# Zipkin Distributed Tracing
# ===============================
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=${ZIPKIN_URL:http://localhost:9411/api/v2/spans}
